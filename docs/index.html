<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>📝 할 일 목록</h1>

    <form id="todo-form" class="todo-form" autocomplete="off">
      <input
        id="todo-input"
        type="text"
        placeholder="할 일을 입력하세요"
        maxlength="500"
        required
      />
      <button type="submit">추가</button>
    </form>

    <div id="error" class="error" role="alert" hidden></div>

    <div class="filters">
      <button class="filter active" data-filter="all">전체</button>
      <button class="filter" data-filter="active">진행중</button>
      <button class="filter" data-filter="completed">완료</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <p id="empty" class="empty" hidden>아직 할 일이 없습니다.</p>
    <footer id="summary" class="summary"></footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
